name: Monthly Macro Ingestion

on:
  schedule:
    # Runs at 07:00 UTC on the 2nd of every month
    # (2nd not 1st — gives sources time to publish their monthly update)
    - cron: '0 7 2 * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  ingest:
    name: Ingest all macro sources
    runs-on: ubuntu-latest

    env:
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FRED ingestion
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python ingestion/ingest_fred.py

      - name: Run SNB ingestion
        run: python ingestion/ingest_snb.py

      - name: Run OECD ingestion
        run: python ingestion/ingest_oecd.py

      - name: Run dbt
        run: |
          cd dbt
          dbt deps
          dbt run --profiles-dir ci
          dbt test --profiles-dir ci
